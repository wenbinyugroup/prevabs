name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true
      package_scope:
        description: 'What to publish'
        type: choice
        options:
          - full
          - examples-only
        default: full
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

env:
  GMSH_VERSION: "4.13.1"

# ---------------------------------------------------------------------------
# Windows (MSVC x64)
# ---------------------------------------------------------------------------
jobs:
  build-windows:
    if: ${{ inputs.package_scope == 'full' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Gmsh SDK
        shell: pwsh
        run: |
          $sdkUrl = "https://gmsh.info/bin/Windows/gmsh-${{ env.GMSH_VERSION }}-Windows64-sdk.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile gmsh-sdk.zip
          Expand-Archive gmsh-sdk.zip -DestinationPath .
          "Gmsh_ROOT=$PWD\gmsh-${{ env.GMSH_VERSION }}-Windows64-sdk" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure and build
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Integration tests
        shell: pwsh
        run: |
          # Configure (no compilation — project(NONE))
          cmake -S test\integration -B test\integration\build `
            "-DPREVABS=$PWD\build\Release\prevabs.exe"
          # Put Gmsh DLL on PATH so the exe can find it at runtime
          $env:PATH = "$env:Gmsh_ROOT\lib;$env:PATH"
          ctest --test-dir test\integration\build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          $gmshApiVersion = ([version]$env:GMSH_VERSION).Major.ToString() + "." +
            ([version]$env:GMSH_VERSION).Minor.ToString()
          $gmshDll = "$env:Gmsh_ROOT\lib\gmsh-$gmshApiVersion.dll"
          $gmshLicense = "$env:Gmsh_ROOT\share\doc\gmsh\LICENSE.txt"
          $gmshCredits = "$env:Gmsh_ROOT\share\doc\gmsh\CREDITS.txt"
          $projectReadme = "README.md"
          $projectLicense = "LICENSE"
          $runtimePkg = "prevabs-${tag}-windows-x64"
          $fullPkg = "prevabs-${tag}-windows-x64-full"

          function Initialize-Package([string]$pkgDir) {
            New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
            Copy-Item "build\Release\prevabs.exe" "$pkgDir\"
            Copy-Item $gmshDll "$pkgDir\"
            Copy-Item "share\MaterialDB.xml" "$pkgDir\"
            Copy-Item $projectReadme (Join-Path $pkgDir "README.md")
            Copy-Item $projectLicense (Join-Path $pkgDir "LICENSE")
            Copy-Item $gmshLicense (Join-Path $pkgDir "LICENSE-gmsh.txt")
            Copy-Item $gmshCredits (Join-Path $pkgDir "CREDITS-gmsh.txt")
          }

          Initialize-Package $runtimePkg
          Compress-Archive -Path $runtimePkg -DestinationPath "${runtimePkg}.zip"

          Initialize-Package $fullPkg
          New-Item -ItemType Directory -Force -Path "$fullPkg\gmsh" | Out-Null
          Copy-Item "$env:Gmsh_ROOT\bin\gmsh.exe" "$fullPkg\gmsh\"
          if (Test-Path "$env:Gmsh_ROOT\bin\onelab.py") {
            Copy-Item "$env:Gmsh_ROOT\bin\onelab.py" "$fullPkg\gmsh\"
          }
          Compress-Archive -Path $fullPkg -DestinationPath "${fullPkg}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: prevabs-*-windows-x64*.zip

# ---------------------------------------------------------------------------
# Linux – Ubuntu/Debian (x64)
# ---------------------------------------------------------------------------
  build-ubuntu:
    if: ${{ inputs.package_scope == 'full' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglu1-mesa-dev libgl-dev \
            libx11-dev libxrender-dev libxft-dev \
            libxcursor-dev libxfixes-dev libxinerama-dev \
            libfontconfig-dev

      - name: Download Gmsh SDK
        run: |
          wget -q "https://gmsh.info/bin/Linux/gmsh-${{ env.GMSH_VERSION }}-Linux64-sdk.tgz"
          tar xf "gmsh-${{ env.GMSH_VERSION }}-Linux64-sdk.tgz"
          echo "Gmsh_ROOT=$PWD/gmsh-${{ env.GMSH_VERSION }}-Linux64-sdk" >> $GITHUB_ENV

      - name: Configure and build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_EXE_LINKER_FLAGS=-Wl,-rpath,\$ORIGIN"
          cmake --build build -j$(nproc)

      - name: Integration tests
        run: |
          cmake -S test/integration -B test/integration/build \
            -DPREVABS="$PWD/build/prevabs"
          # $ORIGIN rpath looks in build/, but libgmsh.so lives in the SDK;
          # LD_LIBRARY_PATH is searched next and covers it for CI.
          LD_LIBRARY_PATH="$Gmsh_ROOT/lib" \
            ctest --test-dir test/integration/build --output-on-failure

      - name: Package
        run: |
          TAG="${{ inputs.tag }}"
          PKG="prevabs-${TAG}-linux-ubuntu-x64"
          mkdir "$PKG"
          cp build/prevabs "$PKG/"
          cp -P "$Gmsh_ROOT"/lib/libgmsh.so* "$PKG/"
          cp share/MaterialDB.xml "$PKG/"
          cp README.md "$PKG/"
          cp LICENSE "$PKG/"
          cp "$Gmsh_ROOT"/share/doc/gmsh/LICENSE.txt "$PKG/LICENSE-gmsh.txt"
          cp "$Gmsh_ROOT"/share/doc/gmsh/CREDITS.txt "$PKG/CREDITS-gmsh.txt"
          tar czf "${PKG}.tar.gz" "$PKG/"

      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu-package
          path: prevabs-*-linux-ubuntu-x64.tar.gz

# ---------------------------------------------------------------------------
# Linux – RHEL/CentOS (Rocky Linux 9 container)
# ---------------------------------------------------------------------------
  build-rhel:
    if: ${{ inputs.package_scope == 'full' }}
    runs-on: ubuntu-latest
    container: rockylinux:9
    steps:
      # git must be installed before actions/checkout
      - name: Install build tools
        run: |
          dnf install -y git cmake gcc gcc-c++ make wget \
            mesa-libGLU-devel mesa-libGL-devel \
            libX11-devel libXrender-devel libXft-devel \
            libXcursor-devel libXfixes-devel libXinerama-devel \
            fontconfig-devel

      - uses: actions/checkout@v4

      - name: Download Gmsh SDK
        run: |
          wget -q "https://gmsh.info/bin/Linux/gmsh-${{ env.GMSH_VERSION }}-Linux64-sdk.tgz"
          tar xf "gmsh-${{ env.GMSH_VERSION }}-Linux64-sdk.tgz"
          echo "Gmsh_ROOT=$PWD/gmsh-${{ env.GMSH_VERSION }}-Linux64-sdk" >> $GITHUB_ENV

      - name: Configure and build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_EXE_LINKER_FLAGS=-Wl,-rpath,\$ORIGIN"
          cmake --build build -j$(nproc)

      - name: Integration tests
        run: |
          cmake -S test/integration -B test/integration/build \
            -DPREVABS="$PWD/build/prevabs"
          LD_LIBRARY_PATH="$Gmsh_ROOT/lib" \
            ctest --test-dir test/integration/build --output-on-failure

      - name: Package
        run: |
          TAG="${{ inputs.tag }}"
          PKG="prevabs-${TAG}-linux-rhel9-x64"
          mkdir "$PKG"
          cp build/prevabs "$PKG/"
          cp -P "$Gmsh_ROOT"/lib/libgmsh.so* "$PKG/"
          cp share/MaterialDB.xml "$PKG/"
          cp README.md "$PKG/"
          cp LICENSE "$PKG/"
          cp "$Gmsh_ROOT"/share/doc/gmsh/LICENSE.txt "$PKG/LICENSE-gmsh.txt"
          cp "$Gmsh_ROOT"/share/doc/gmsh/CREDITS.txt "$PKG/CREDITS-gmsh.txt"
          tar czf "${PKG}.tar.gz" "$PKG/"

      - uses: actions/upload-artifact@v4
        with:
          name: rhel-package
          path: prevabs-*-linux-rhel9-x64.tar.gz

# ---------------------------------------------------------------------------
# Examples – packaged from per-example meta.json tracked files
# ---------------------------------------------------------------------------
  package-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package examples
        run: |
          TAG="${{ inputs.tag }}"
          PKG="prevabs-${TAG}-examples"
          python3 - <<'EOF'
          import json, os, shutil, sys
          from pathlib import Path

          pkg = os.environ["PKG"]
          examples_dir = Path("share") / "examples"

          def load_string_list(entry, key):
              value = entry.get(key, [])
              if not isinstance(value, list):
                  raise ValueError(f"{key} must be an array in {entry}")
              return [str(item).strip() for item in value if str(item).strip()]

          for meta_path in sorted(examples_dir.glob("*/meta.json")):
              example_dir = meta_path.parent
              with meta_path.open(encoding="utf-8") as f:
                  meta = json.load(f)

              tracked = {"README.md", "meta.json"}
              for key in ("inputs", "outputs", "doc_images"):
                  tracked.update(load_string_list(meta, key))

              preview = str(meta.get("preview", "")).strip()
              if preview:
                  tracked.add(preview)

              dst = Path(pkg) / example_dir.name
              dst.mkdir(parents=True, exist_ok=True)
              for name in sorted(tracked):
                  src = example_dir / name
                  if not src.exists():
                      print(
                          f"WARNING: missing tracked example file: {src}",
                          file=sys.stderr,
                      )
                      continue
                  shutil.copy2(src, dst / name)
          EOF
          cp README.md "$PKG/"
          cp LICENSE "$PKG/"
          zip -r "${PKG}.zip" "$PKG/"
        env:
          PKG: prevabs-${{ inputs.tag }}-examples

      - uses: actions/upload-artifact@v4
        with:
          name: examples-package
          path: prevabs-*-examples.zip

# ---------------------------------------------------------------------------
# Create GitHub Release
# ---------------------------------------------------------------------------
  release-full:
    if: ${{ inputs.package_scope == 'full' }}
    needs: [build-windows, build-ubuntu, build-rhel, package-examples]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Extract release notes from CHANGELOG
        env:
          TAG: ${{ inputs.tag }}
        run: |
          python3 - <<'EOF'
          import os
          import re
          import sys

          tag = os.environ["TAG"].strip()
          version = tag[1:] if tag.startswith("v") else tag
          mm = ".".join(version.split(".")[:2])

          with open("CHANGELOG.md", encoding="utf-8") as f:
              lines = f.readlines()

          def is_heading(line):
              return line.startswith("## ")

          def collect(start, stop_pred):
              out = []
              for i in range(start, len(lines)):
                  line = lines[i]
                  if i > start and stop_pred(line):
                      break
                  out.append(line)
              return "".join(out).strip()

          exact_entry = re.compile(
              rf"^- {re.escape(version)}(?:\s*\(.*\))?\s*$"
          )
          exact_heading = re.compile(
              rf"^## Version {re.escape(version)}(?:\s*\(.*\))?\s*$"
          )
          minor_heading = re.compile(
              rf"^## Version {re.escape(mm)}(?:\s*\(.*\))?\s*$"
          )
          any_entry = re.compile(r"^- \d+\.\d+(?:\.\d+)?(?:\s*\(.*\))?\s*$")

          notes = ""

          for i, line in enumerate(lines):
              if exact_entry.match(line.strip()):
                  notes = collect(
                      i,
                      lambda s: is_heading(s) or any_entry.match(s.strip())
                  )
                  break

          if not notes:
              for i, line in enumerate(lines):
                  if exact_heading.match(line.strip()):
                      notes = collect(i, is_heading)
                      break

          if not notes:
              for i, line in enumerate(lines):
                  if minor_heading.match(line.strip()):
                      notes = collect(i, is_heading)
                      break

          if not notes:
              print(
                  f"Could not find release notes for tag '{tag}' in "
                  f"CHANGELOG.md",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(notes + "\n")
          EOF
          cat release_notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.zip artifacts/*.tar.gz \
              --clobber
          else
            gh release create "$TAG" \
              --title "PreVABS $TAG" \
              --notes-file release_notes.md \
              $PRERELEASE_FLAG \
              artifacts/*.zip \
              artifacts/*.tar.gz
          fi

  release-examples:
    if: ${{ inputs.package_scope == 'examples-only' }}
    needs: [package-examples]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download examples artifact
        uses: actions/download-artifact@v4
        with:
          name: examples-package
          path: artifacts/

      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        env:
          TAG: ${{ inputs.tag }}
        run: |
          python3 - <<'EOF'
          import os
          import re
          import sys

          tag = os.environ["TAG"].strip()
          version = tag[1:] if tag.startswith("v") else tag
          mm = ".".join(version.split(".")[:2])

          with open("CHANGELOG.md", encoding="utf-8") as f:
              lines = f.readlines()

          def is_heading(line):
              return line.startswith("## ")

          def collect(start, stop_pred):
              out = []
              for i in range(start, len(lines)):
                  line = lines[i]
                  if i > start and stop_pred(line):
                      break
                  out.append(line)
              return "".join(out).strip()

          exact_entry = re.compile(
              rf"^- {re.escape(version)}(?:\s*\(.*\))?\s*$"
          )
          exact_heading = re.compile(
              rf"^## Version {re.escape(version)}(?:\s*\(.*\))?\s*$"
          )
          minor_heading = re.compile(
              rf"^## Version {re.escape(mm)}(?:\s*\(.*\))?\s*$"
          )
          any_entry = re.compile(r"^- \d+\.\d+(?:\.\d+)?(?:\s*\(.*\))?\s*$")

          notes = ""

          for i, line in enumerate(lines):
              if exact_entry.match(line.strip()):
                  notes = collect(
                      i,
                      lambda s: is_heading(s) or any_entry.match(s.strip())
                  )
                  break

          if not notes:
              for i, line in enumerate(lines):
                  if exact_heading.match(line.strip()):
                      notes = collect(i, is_heading)
                      break

          if not notes:
              for i, line in enumerate(lines):
                  if minor_heading.match(line.strip()):
                      notes = collect(i, is_heading)
                      break

          if not notes:
              print(
                  f"Could not find release notes for tag '{tag}' in "
                  f"CHANGELOG.md",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(notes + "\n")
          EOF

      - name: Create or update GitHub Release with examples
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.zip --clobber
          else
            gh release create "$TAG" \
              --title "PreVABS $TAG" \
              --notes-file release_notes.md \
              $PRERELEASE_FLAG \
              artifacts/*.zip
          fi
