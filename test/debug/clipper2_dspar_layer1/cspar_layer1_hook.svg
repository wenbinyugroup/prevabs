<text x="28" y="432" font-size="16" font-weight="600" fill="#222">B. raw offset head (pre-trim)</text>
<text x="28" y="452" font-size="12" fill="#777">makeRawOffsetCurve output; first vertex is the tip, NOT on the bound</text>
<line x1="150.00" y1="690.00" x2="330.00" y2="520.00" stroke="#188038" stroke-width="2.4" stroke-dasharray="3,3"/>
<text x="336" y="516" font-size="12.5" fill="#188038" font-weight="600" >begin bound</text>
<line x1="150.00" y1="690.00" x2="440.00" y2="706.00" stroke="#1a73e8" stroke-width="2.4"/>
<circle cx="150" cy="690" r="5" fill="#1a73e8"/><text x="142" y="710" font-size="12.5" fill="#1a73e8" font-weight="600" text-anchor="middle">base.v0 (p4)</text>
<line x1="185.00" y1="632.00" x2="400.00" y2="650.00" stroke="#e8841a" stroke-width="2.6"/>
<polyline points="400,650 440,656" fill="none" stroke="#e8841a" stroke-width="2.6"/>
<circle cx="185" cy="632" r="5" fill="#e8841a"/><text x="177" y="622" font-size="12.5" fill="#e8841a" font-weight="600" text-anchor="middle">raw.v0 = tip</text>
<circle cx="400" cy="650" r="5" fill="#e8841a"/><text x="408" y="666" font-size="12.5" fill="#e8841a" font-weight="600" >raw.v1</text>
<text x="150" y="742" font-size="12" fill="#555">tip floats just inside the bound (no vertex anchored on it) → clean, monotone</text>
<text x="628" y="432" font-size="16" font-weight="600" fill="#222">C. after trimLayerCurveEndsToCaps (post-trim)</text>
<text x="628" y="452" font-size="12" fill="#777">trim PREPENDS skin.v0 on the bound, in front of the tip → near-collinear spike</text>
