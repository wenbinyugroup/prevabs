<line x1="788.00" y1="640.00" x2="838.00" y2="628.00" stroke="#a142f4" stroke-width="3.4" stroke-dasharray="6,3"/>
<line x1="788.00" y1="640.00" x2="1000.00" y2="650.00" stroke="#a142f4" stroke-width="3.4" stroke-dasharray="6,3"/>
<circle cx="838" cy="628" r="5" fill="#d93025"/><text x="846" y="622" font-size="12.5" fill="#d93025" font-weight="600" >skin.v0 (prepended, on bound)</text>
<circle cx="788" cy="640" r="5" fill="#d93025"/><text x="780" y="630" font-size="12.5" fill="#d93025" font-weight="600" text-anchor="middle">skin.v1 = tip</text>
<circle cx="1000" cy="650" r="5" fill="#d93025"/><text x="1008" y="666" font-size="12.5" fill="#d93025" font-weight="600" >skin.v2</text>
<path d="M 805 633 A 40 40 0 0 1 808 646" fill="none" stroke="#a142f4" stroke-width="1.6"/>
<text x="700" y="604" font-size="13" fill="#a142f4" font-weight="700">δ ≈ 4.87e-15 rad</text>
<text x="700" y="620" font-size="11.5" fill="#a142f4">skin.v1→skin.v0  ∥  skin.v1→skin.v2</text>
<text x="700" y="742" font-size="12" fill="#555">the prepended skin.v0 makes the head double back → spike at skin.v1</text>
<rect x="20" y="770" width="1160" height="74" rx="8" fill="#fff5f5" stroke="#d93025" stroke-width="1.3"/>
<text x="34" y="792" font-size="12.5" fill="#5f2120">Consequence: splitFaceByPolyline embeds skin.v0; updateEdgeNeighbors sorts the vertex’s outgoing edges by angle to weave the new edge in, but at the spike</text>
<text x="34" y="809" font-size="12.5" fill="#5f2120">δ→0 it inserts on the wrong side. The two split loops then grab only a tiny arc (77 edges each) and the full base+shell boundary (145 edges) is left UN-bisected,</text>
<text x="34" y="826" font-size="12.5" fill="#5f2120">so the downstream face-selection + staircase run on corrupt topology → crash. Fix (A): trim should land the head ON the bound WITHOUT keeping the near-collinear tip.</text>
</svg>