<text x="36" y="998" font-size="16" font-weight="bold" fill="#bf360c">C  机制（step 1 埋点实测，已回退）</text>
<text x="36" y="1028" font-size="13" font-weight="normal" fill="#333">staircase pairs 头部： (b0,o0)(b1,o1)(b2,o2)(b3,o3)(b4,o3)(b5,o3)(b6,o4)…  ← base 3/4/5 都配 offset 3 = outer(shell) 侧 stall</text>
<text x="36" y="1054" font-size="13" font-weight="normal" fill="#333">• step 4 connector = (inner[4], outer[3])，step 5 connector = (inner[5], outer[3])  —— 两条都从同一个 shell 顶点 outer[3] 扇出。</text>
<text x="36" y="1080" font-size="13" font-weight="normal" fill="#333">• 薄层头部，这两刀夹出的三角形是近零面积 sliver（实测 d0≈1.3e-6 / 2.9e-6）。</text>
<text x="36" y="1106" font-size="13" font-weight="bold" fill="#b71c1c">• step 5 的 splitFaceByPolyline 返回两张面：c0 ≡ c1 = (1.57102, -0.054969)，边数同为 8 —— 退化分裂（两面重合）。</text>
<text x="36" y="1132" font-size="13" font-weight="normal" fill="#333">• d0&lt;=d1 平局把退化 8-边 sliver 选为 remaining（回折成 8 字：v#84/379/380 各两次 + v#305/378）。</text>
<text x="36" y="1158" font-size="13" font-weight="bold" fill="#b71c1c">• step 6 在该退化 sliver 上 split → split_faces=0 → fatal（端点掉出边界是结果，不是根因）。</text>
<text x="36" y="1184" font-size="13" font-weight="normal" fill="#1b5e20">对照：前面各层 stall 在 inner 侧（apex 落在 inner 曲线，三角形正常可切，全部成功）。inner-stall 安全 / outer-stall 退化 = 关键不对称。</text>
<text x="36" y="1210" font-size="13" font-weight="bold" fill="#0d47a1">修复方向：(D) 构造 connector 前对 pairs 做去退化归并——连续同 offset(或同 base)的台阶合并成一刀，避免从单顶点扇出零面积 cell；(B) split 后自检 |c0-c1|&lt;tol / 边数&lt;3 作兜底。</text>
</svg>