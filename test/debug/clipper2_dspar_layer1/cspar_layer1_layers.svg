<text x="36" y="1226" font-size="13" fill="#1b5e20">结论：失败【不是】offset&#160;误差累积。</text>
<text x="36" y="1248" font-size="13" fill="#1b5e20">•&#160;SEQ(逐层)&#160;与&#160;DIR(直接累积)&#160;各层最大偏差&#160;≤&#160;8.8e-5，占该层厚度&#160;&lt;&#160;0.75%、占&#160;base&#160;离散分辨率(~0.023)&#160;&lt;&#160;0.4%。</text>
<text x="36" y="1270" font-size="13" fill="#1b5e20">•&#160;偏差虽随层号略增(L2&#160;2e-5&#160;→&#160;L4&#160;8.8e-5)，但量级远小于致命的零面积&#160;sliver，且&#160;shell(L5)&#160;直接复用、偏差≈0。</text>
<text x="36" y="1292" font-size="13" fill="#1b5e20">•&#160;各层曲线干净嵌套(面板A&#160;无交叉/无回折)，头部顶点不塌缩、不逐层错位(面板B&#160;实线≈虚线)。</text>
<text x="36" y="1314" font-size="13" fill="#1b5e20">•&#160;真正根因在&#160;staircase&#160;配对：最后一层&#160;shell&#160;头部点更稀&#160;→&#160;outer&#160;侧&#160;stall&#160;→&#160;connector&#160;从单个&#160;shell</text>
<text x="36" y="1336" font-size="13" fill="#1b5e20">&#160;&#160;顶点扇出&#160;→&#160;零面积&#160;sliver&#160;→&#160;step5&#160;退化分裂(见&#160;cspar_layer1_final_stall.svg)。与曲线&#160;offset&#160;精度无关。</text>
